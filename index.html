<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Autoplay Example</title>
    <style>
        /* Styled select element */
        select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Audio Autoplay Example</h1>
    <label for="category">Choose a category:</label>
    <select id="category">
        <optgroup label="Music">
            <option value="song1.mp3">Song 1</option>
            <option value="song2.mp3">Song 2</option>
        </optgroup>
        <optgroup label="Sounds">
            <option value="sound1.mp3">Sound 1</option>
            <option value="sound2.mp3">Sound 2</option>
        </optgroup>
    </select>
    <br>
    <label>
        <input type="checkbox" id="autoplayToggle" /> Autoplay
    </label>
    <script>
        const audio = new Audio();
        const toggle = document.getElementById('autoplayToggle');
        const categorySelect = document.getElementById('category');

        // Load autoplay state from localStorage
        toggle.checked = localStorage.getItem('autoplayEnabled') === 'true';

        toggle.addEventListener('change', () => {
            localStorage.setItem('autoplayEnabled', toggle.checked);
        });

        categorySelect.addEventListener('change', (event) => {
            audio.src = event.target.value;
            if (toggle.checked) {
                audio.play();
            }
        });
    </script>
</body>
</html>
